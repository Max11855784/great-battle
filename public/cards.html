<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Great Battle Cards</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="lobby-page">
  <div class="lobby-container">
    <header class="lobby-header">
      <div class="header-content">
        <h1>CARDS LIBRARY</h1>

        <div class="user-info">
          <a class="nav-link" href="/lobby">Lobby</a>
          <a class="nav-link" href="/profile">Profile</a>
          <a class="nav-link" href="/rating">Rating</a>
          <button class="logout-btn" id="logout-btn">DISCONNECT</button>
        </div>
      </div>
    </header>

    <main class="lobby-main">
      <div class="cards-library-header">
        <div>
          <h2>Marvel Cards</h2>
          <p class="search-subtitle">
            All cards used in Great Battle. Stronger cards have higher cost.
          </p>
        </div>

        <div class="cards-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="hero">Heroes</button>
          <button class="filter-btn" data-filter="villain">Villains</button>
        </div>
      </div>

      <div class="cards-count" id="cards-count">Loading cards...</div>

      <div class="cards-library-grid" id="cards-grid"></div>

      <div class="form-error" id="cards-error"></div>
    </main>

    <div class="auth-background">
      <div class="grid-overlay"></div>
      <div class="scanlines"></div>
    </div>
  </div>

  <script src="/js/cards.js"></script>
</body>

</html>
