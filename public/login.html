<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Great Battle Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth-page">
  <div class="auth-container">
    <div class="auth-panel">
      <h1 class="auth-title">TACTICAL HUD</h1>
      <p class="auth-subtitle">Login to Great Battle</p>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="login">Login:</label>
          <input type="text" id="login" name="login" placeholder="Enter your login" required>
        </div>

        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>

        <div class="form-error" id="login-error"></div>

        <button type="submit" class="auth-btn btn-primary">ACTIVATE</button>
      </form>

      <div class="auth-footer">
        <p>New agent? <a href="/register">Create profile</a></p>
        <p><a href="/">Back to main page</a></p>
      </div>
    </div>

    <div class="auth-background">
      <div class="grid-overlay"></div>
      <div class="scanlines"></div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>

</html>
