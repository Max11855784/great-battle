<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Great Battle Profile</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="lobby-page">
  <div class="lobby-container">
    <header class="lobby-header">
      <div class="header-content">
        <h1>AGENT PROFILE</h1>

        <div class="user-info">
          <a class="nav-link" href="/lobby">Lobby</a>
          <a class="nav-link" href="/cards">Cards Library</a>
          <a class="nav-link" href="/rating">Rating</a>
          <button class="logout-btn" id="logout-btn">DISCONNECT</button>
        </div>
      </div>
    </header>

    <main class="lobby-main">
      <section class="profile-panel">
        <div class="profile-main-card">
          <img id="profile-avatar" class="profile-avatar" src="" alt="Profile avatar">

          <div class="profile-info">
            <h2 id="profile-login">Loading...</h2>
            <p id="profile-created">Created: loading...</p>
          </div>
        </div>

        <div class="profile-stats-grid">
          <div class="profile-stat-card">
            <div class="profile-stat-value" id="wins-count">0</div>
            <div class="profile-stat-label">Wins</div>
          </div>

          <div class="profile-stat-card">
            <div class="profile-stat-value" id="losses-count">0</div>
            <div class="profile-stat-label">Losses</div>
          </div>

          <div class="profile-stat-card">
            <div class="profile-stat-value" id="total-count">0</div>
            <div class="profile-stat-label">Total Battles</div>
          </div>
        </div>

        <section class="achievements-section">
          <h2>Achievements</h2>
          <p class="search-subtitle">
            Achievements are calculated from your finished battles.
          </p>

          <div class="achievements-grid" id="achievements-grid">
            <div class="empty-zone-message">Loading achievements...</div>
          </div>
        </section>

        <div class="profile-actions">
          <a class="auth-btn btn-primary link-btn" href="/lobby">Back to Lobby</a>
        </div>

        <div class="form-error" id="profile-error"></div>
      </section>
    </main>

    <div class="auth-background">
      <div class="grid-overlay"></div>
      <div class="scanlines"></div>
    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>

</html>
