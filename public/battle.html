<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Great Battle</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="game-page">
  <div class="game-container">
    <header class="game-header">
      <div class="player-status opponent-status">
        <div class="battle-player-head">
          <img class="battle-avatar" id="opponent-avatar" src="/images/avatars/avatar_men.png" alt="Opponent avatar">

          <div class="battle-player-main">
            <div class="status-name" id="opponent-login">Opponent</div>

            <div class="health-bar">
              <div class="health-fill" id="opponent-health-fill"></div>
            </div>

            <div class="health-text">
              <span id="opponent-hp">20</span> / 20 HP
            </div>

            <div class="status-extra">
              Faction: <span id="opponent-faction" class="faction-badge">-</span> |
              Mana: <span id="opponent-mana">0</span> / 20 |
              Hand: <span id="opponent-hand-count">0</span>
            </div>
          </div>
        </div>
      </div>

      <div class="game-timer">
        <div class="timer-display" id="timer">30</div>
        <div class="timer-label" id="turn-label">sec</div>
      </div>

      <div class="player-status player-status-current">
        <div class="battle-player-head battle-player-head-right">
          <div class="battle-player-main">
            <div class="status-name" id="my-login">You</div>

            <div class="health-bar">
              <div class="health-fill" id="my-health-fill"></div>
            </div>

            <div class="health-text">
              <span id="my-hp">20</span> / 20 HP
            </div>

            <div class="status-extra">
              Faction: <span id="my-faction" class="faction-badge">-</span> |
              Mana: <span id="my-mana-top">0</span> / 20
            </div>
          </div>

          <img class="battle-avatar" id="my-avatar" src="/images/avatars/avatar_men.png" alt="Your avatar">
        </div>
      </div>
    </header>

    <main class="game-battlefield">
      <section class="battlefield-zone opponent-zone">
        <h2 class="zone-title">Opponent Field</h2>
        <div class="cards-field" id="opponent-field"></div>
      </section>

      <section class="battlefield-zone player-zone">
        <h2 class="zone-title">Your Field</h2>
        <div class="cards-field" id="player-field"></div>
      </section>
    </main>

    <section class="hand-zone">
      <h2 class="zone-title">Hand</h2>
      <div class="hand-container" id="hand"></div>
    </section>

    <aside class="game-info-panel">
      <div class="info-section">
        <h3>FACTION</h3>
        <div class="mana-display">
          <span id="side-faction">Loading...</span>
        </div>
      </div>

      <div class="info-section">
        <h3>MANA</h3>
        <div class="mana-display">
          <span class="mana-current" id="mana-current">0</span> /
          <span class="mana-max" id="mana-max">20</span>
        </div>
      </div>

      <div class="info-section">
        <h3>ACTIONS</h3>
        <button class="action-btn btn-secondary" id="attack-end-turn-btn" disabled>
          Attack & End Turn
        </button>

        <button class="action-btn logout-btn give-up" id="give-up-btn">
          Give up
        </button>
      </div>

      <div class="info-section">
        <h3>STATUS</h3>
        <div class="status-message" id="battle-status">Loading...</div>
      </div>

      <div class="info-section">
        <h3>LOG</h3>
        <div class="side-log" id="battle-log-list"></div>
      </div>
    </aside>

    <div class="result-modal" id="result-modal">
      <div class="result-modal-content">
        <h2 id="result-title">Battle ended</h2>
        <p id="result-message"></p>
        <button class="auth-btn btn-primary" id="back-to-lobby-btn">
          Back to lobby
        </button>
      </div>
    </div>

    <div class="auth-background">
      <div class="grid-overlay"></div>
      <div class="scanlines"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/battle.js"></script>
</body>

</html>
